# Component template containing one internal region of every supported state:
# air, solid (heat source), fan, and vent.

name = "Test Component - All Internal Region Types"
watts = 20.0

[size]
units = "m"
width = 0.40
depth = 0.40
height = 0.40

[material]
rho = 2700.0
cp = 900.0
k = 205.0

# -----------------------------------------------------------------------------
# AIR REGION
# -----------------------------------------------------------------------------
[[internal_regions]]
state = "air"
name = "Internal Air Volume"

[internal_regions.size]
units = "m"
width = 0.12
depth = 0.12
height = 0.12

[internal_regions.position]
units = "m"
x = 0.04
y = 0.04
z = 0.04

# -----------------------------------------------------------------------------
# SOLID / HEAT-SOURCE REGION
# -----------------------------------------------------------------------------
[[internal_regions]]
state = "solid"
name = "Processor Heat Block"
watts = 75.0

[internal_regions.size]
units = "m"
width = 0.08
depth = 0.08
height = 0.04

[internal_regions.position]
units = "m"
x = 0.20
y = 0.20
z = 0.16

[internal_regions.material]
rho = 8960.0
cp = 385.0
k = 401.0

# -----------------------------------------------------------------------------
# RECTANGULAR FAN REGION
# The zero depth places the fan on the component's y = 0 face.
# -----------------------------------------------------------------------------
[[internal_regions]]
state = "fan"
name = "Internal Intake Fan"
shape = "rectangular"
flow_type = "intake"
cfm = 35.0

[internal_regions.size]
units = "m"
width = 0.10
depth = 0.0
height = 0.10

[internal_regions.position]
units = "m"
x = 0.05
y = 0.0
z = 0.24

[internal_regions.direction]
x = 0.0
y = 1.0
z = 0.0

# -----------------------------------------------------------------------------
# RECTANGULAR VENT REGION
# The zero depth places the vent on the component's y = depth face.
# -----------------------------------------------------------------------------
[[internal_regions]]
state = "vent"
name = "Internal Exhaust Vent"
shape = "rectangular"
free_area_ratio = 0.70
vent_discharge_coeff = 0.62

[internal_regions.size]
units = "m"
width = 0.12
depth = 0.0
height = 0.12

[internal_regions.position]
units = "m"
x = 0.22
y = 0.40
z = 0.22

[internal_regions.normal]
x = 0.0
y = 1.0
z = 0.0
