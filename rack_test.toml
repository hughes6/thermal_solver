name = "Rack Test"

# -------------------------------------------------------------
# Simulation
# -------------------------------------------------------------

[simulation]
dt = 0.05
duration = 10.0
output_interval = 10
enable_flow_solver = false
max_timesteps = 1000000
max_updates = 10000000
max_cell_count = 10000000
max_megabyte_usage = 4

# -------------------------------------------------------------
# Environment - air properties
# -------------------------------------------------------------

[environment]
humidity = 30.0
elevation = 5500.0
T_ambeint = 20.0
cp = 0.0
k = 0.0
mu = 0.0
pr = 0.0
rho = 0.0

# -------------------------------------------------------------
# Mesh
# -------------------------------------------------------------

[mesh]
dx = 0.1
dy = 0.1
dz = 0.1

# -------------------------------------------------------------
# Rack
# -------------------------------------------------------------

[rack] 
name = "testing rack"

[rack.size]
width = 5.0
depth = 5.0
height = 10.0

[rack.ambient]
temperature = 293.15
pressure = 101325
density = 1.204
cp = 1005
k = 0.02587
rho = 1.204

# -------------------------------------------------------------
# Components
# -------------------------------------------------------------

[[components]]
name = "Server 1"
watts = 500

[components.position]
x = 0.0
y = 0.0
z = 1.0

[components.size]
width = 5.0
depth = 5.0
height = 1.0

[components.material]
rho = 2700
cp = 900
k = 150

# ----- region 1 --------

[[components.internal_regions]]
name = "CPU"
watts = 200
state = "solid" 

[components.internal_regions.position]
x = 0.0
y = 0.0
z = 0.0

[components.internal_regions.size]
width = 1.0
depth = 5.0
height = 1.0

[components.internal_regions.material]
rho = 2300
cp = 700
k = 120

# -------------------------------------------------------------
# Fans
# -------------------------------------------------------------

[[fans]]
name = "Top fan"
shape = "circular"
diameter = 0.012
cfm = 80.0
flow_type = "exhaust"

[fans.position]
x = 2.5
y = 2.5
z = 10.0

[fans.direction]
x = 0.0
y = 0.0
z = 1.0


# -------------------------------------------------------------
# Vents
# -------------------------------------------------------------

[[vents]]
name = "main front vent"
shape = "rectangular"
free_area_ratio = 0.5

[vents.position]
x = 2.5
y = 0
z = 4

[vents.size]
width = 1
depth = 0
height = 1

[vents.normal]
x = 0.0
y = 1.0
z = 0.0
