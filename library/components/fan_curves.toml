# fan_curves.toml
# P-Q curve: dP(Q) = a - b*Q - c*Q^2   [Pa, as a function of m^3/s]
# rho_rated: air density (kg/m^3) the manufacturer's curve was measured at

[[fan_curve]]
name = "delta_afb0812_12v"
rho_rated = 1.2
a = 120.0     # Pa, shutoff pressure
b = 300.0     # Pa / (m^3/s)
c = 50.0      # Pa / (m^3/s)^2

[[fan_curve]]
name = "generic_80mm_low_speed"
rho_rated = 1.2
a = 60.0
b = 400.0
c = 0.0

[[fan_curve]]
name = "generic_120mm_high_static"
rho_rated = 1.2
a = 250.0
b = 150.0
c = 20.0